name: Railway Broker Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Cargo.lock
      - Cargo.toml
      - crates/**
      - docker/broker.Dockerfile
      - frontend/**
      - package-lock.json
      - package.json
      - railway.toml
      - scripts/railway-deploy.mjs
      - scripts/railway-deploy.test.mjs
      - vite.config.js
      - .github/workflows/railway-broker-deploy.yml

permissions:
  contents: read

jobs:
  # Build the frontend, serve it through the relay, and load every page in a
  # real browser before we ship. If a page fails to render (uncaught error, CSP
  # violation, or a root that never mounts) this job fails and the deploy below
  # is skipped — "if the page is broken, don't deploy". Also runs the static
  # lint and unit tests.
  gate:
    name: pre-deploy-checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: npm ci
        run: npm ci

      - name: Lint
        run: npm run lint

      # Build the broker image in the SAME minimal Docker context Railway uses
      # (only the files docker/broker.Dockerfile COPYs). This catches both
      # frontend-context issues and Rust image/toolchain mismatches before we
      # ever call `railway up`.
      - name: Verify broker image builds
        run: docker build -f docker/broker.Dockerfile .

      - name: Unit tests
        run: npm test

      - name: Install Playwright
        run: npm run test:browser:install:ci

      - name: Build relay-server
        run: cargo build -p relay-server

      - name: Page smoke test
        run: npm run test:browser:smoke

  deploy:
    name: deploy-public-broker
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
      RAILWAY_PROJECT_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_ACCOUNT_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Railway deploy inputs
        id: railway_inputs
        shell: bash
        run: |
          if [ -z "${RAILWAY_SERVICE_ID:-}" ]; then
            echo "::notice::Skipping Railway deploy. Set repository variable RAILWAY_SERVICE_ID to enable this workflow."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          elif [ -z "${RAILWAY_PROJECT_TOKEN:-}" ] && [ -z "${RAILWAY_ACCOUNT_TOKEN:-}" ]; then
            echo "::notice::Skipping Railway deploy. Set repository secret RAILWAY_TOKEN (project token) or RAILWAY_API_TOKEN (account/workspace token) to enable this workflow."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          elif [ -n "${RAILWAY_PROJECT_TOKEN:-}" ] && [ -n "${RAILWAY_ACCOUNT_TOKEN:-}" ]; then
            echo "::error::Set only one Railway auth secret. Railway CLI supports either RAILWAY_TOKEN or RAILWAY_API_TOKEN, not both."
            exit 1
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.railway_inputs.outputs.ready == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Railway CLI
        if: steps.railway_inputs.outputs.ready == 'true'
        run: |
          npm install -g @railway/cli@5.28.0
          railway --version

      - name: Deploy to Railway
        if: steps.railway_inputs.outputs.ready == 'true'
        shell: bash
        run: |
          if [ -n "${RAILWAY_ACCOUNT_TOKEN:-}" ]; then
            export RAILWAY_API_TOKEN="$RAILWAY_ACCOUNT_TOKEN"
            unset RAILWAY_TOKEN
          else
            export RAILWAY_TOKEN="$RAILWAY_PROJECT_TOKEN"
            unset RAILWAY_API_TOKEN
          fi

          node scripts/railway-deploy.mjs
