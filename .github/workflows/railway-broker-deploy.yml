name: Railway Broker Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Cargo.lock
      - Cargo.toml
      - crates/**
      - docker/broker.Dockerfile
      - frontend/**
      - package-lock.json
      - package.json
      - railway.toml
      - vite.config.js
      - .github/workflows/railway-broker-deploy.yml

permissions:
  contents: read

jobs:
  # Build the frontend, serve it through the relay, and load every page in a
  # real browser before we ship. If a page fails to render (uncaught error, CSP
  # violation, or a root that never mounts) this job fails and the deploy below
  # is skipped — "if the page is broken, don't deploy". Also runs the static
  # lint and unit tests.
  gate:
    name: pre-deploy-checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: npm ci
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Install Playwright
        run: npm run test:browser:install:ci

      - name: Build relay-server
        run: cargo build -p relay-server

      - name: Page smoke test
        run: npm run test:browser:smoke

  deploy:
    name: deploy-public-broker
    needs: gate
    runs-on: ubuntu-latest
    env:
      RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Railway deploy inputs
        id: railway_inputs
        shell: bash
        run: |
          if [ -n "${RAILWAY_TOKEN:-}" ] && [ -n "${RAILWAY_SERVICE_ID:-}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping Railway deploy. Set repository secret RAILWAY_TOKEN and repository variable RAILWAY_SERVICE_ID to enable this workflow."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.railway_inputs.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        if: steps.railway_inputs.outputs.ready == 'true'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: steps.railway_inputs.outputs.ready == 'true'
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if railway up --service "$RAILWAY_SERVICE_ID"; then
              exit 0
            fi
            status=$?
            echo "::warning::railway up failed on attempt ${attempt} with exit code ${status}."
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 20))
            fi
          done
          exit "$status"
