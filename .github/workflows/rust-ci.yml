name: Rust CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  frontend:
    name: npm-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: npm ci
        run: npm ci

      - name: npm test
        run: npm test

  lint:
    name: eslint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: npm ci
        run: npm ci

      # Static `no-undef` guard: catches free/undefined identifiers (e.g. a stray
      # `session` reference) that `vite build` happily emits and only throw at
      # runtime.
      - name: npm run lint
        run: npm run lint

  rust:
    name: fmt-check-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # The claude bridge<->fake-worker integration tests spawn `node`; without a
      # guaranteed Node they would skip silently instead of running.
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        run: cargo test --workspace

  review-recap-modes-e2e:
    name: review-recap-modes-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: npm ci
        run: npm ci

      - name: Build relay-server
        run: cargo build -p relay-server

      # Full-stack HTTP e2e (no browser / Playwright): spins up the real relay
      # binary with the fake provider and drives BOTH review briefing modes
      # through /api/session/review — `recap` (drives a recap turn) and
      # `last_message` (skips it, briefs with the author's last message) — asserting
      # the recap turn's presence/absence and the reviewer's briefing source.
      - name: Review recap-modes e2e
        run: npm run test:review-recap-modes

  browser-smoke:
    name: browser-page-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: npm ci
        run: npm ci

      - name: Install Playwright
        run: npm run test:browser:install:ci

      - name: Build relay-server
        run: cargo build -p relay-server

      # Build the frontend, serve it through the relay, load every entry point in
      # a real browser, and fail on any uncaught error / CSP violation / root
      # that never mounts. This is the guard that catches render crashes
      # (e.g. `session is not defined`) which `vite build` does not.
      - name: Page smoke test
        run: npm run test:browser:smoke

  browser-e2e:
    name: browser-public-core-fake
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: npm ci
        run: npm ci

      - name: Install Playwright
        run: npm run test:browser:install:ci

      - name: Build relay binaries
        run: cargo build -p relay-broker -p relay-server

      - name: Public broker browser smoke
        run: npm run test:browser:public-core:fake

      - name: Upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-public-core-fake-artifacts
          path: artifacts/e2e
          if-no-files-found: ignore
          retention-days: 7

  browser-local-core:
    name: browser-local-core-fake
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: npm ci
        run: npm ci

      - name: Install Playwright
        run: npm run test:browser:install:ci

      - name: Build relay binary
        run: cargo build -p relay-server

      - name: Local browser core fake matrix
        run: npm run test:browser:local-core:fake

      - name: Upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-local-core-fake-artifacts
          path: artifacts/e2e
          if-no-files-found: ignore
          retention-days: 7

  browser-self-hosted:
    name: browser-self-hosted-pairing-fake
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: npm ci
        run: npm ci

      - name: Install Playwright
        run: npm run test:browser:install:ci

      - name: Build relay binaries
        run: cargo build -p relay-broker -p relay-server

      - name: Self-hosted pairing fake smoke
        run: npm run test:browser:pairing:fake

      - name: Upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-self-hosted-pairing-fake-artifacts
          path: artifacts/e2e
          if-no-files-found: ignore
          retention-days: 7

  browser-local-full:
    name: browser-local-full-fake
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: npm ci
        run: npm ci

      - name: Install Playwright
        run: npm run test:browser:install:ci

      - name: Build relay binary
        run: cargo build -p relay-server

      - name: Local browser full fake matrix
        run: npm run test:browser:local-full:fake

      - name: Upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-local-full-fake-artifacts
          path: artifacts/e2e
          if-no-files-found: ignore
          retention-days: 7

  browser-public-full:
    name: browser-public-full-fake
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: npm ci
        run: npm ci

      - name: Install Playwright
        run: npm run test:browser:install:ci

      - name: Build relay binaries
        run: cargo build -p relay-broker -p relay-server

      - name: Public browser full fake matrix
        run: npm run test:browser:public:fake

      - name: Upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-public-full-fake-artifacts
          path: artifacts/e2e
          if-no-files-found: ignore
          retention-days: 7
